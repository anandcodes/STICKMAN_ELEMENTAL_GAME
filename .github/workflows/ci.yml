name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Contrast Check
        run: npm run contrast:check

      - name: Typecheck And Smoke Tests
        run: npm run test

      - name: Build Staging
        run: npm run build:staging

      - name: Build Production
        run: npm run build:production

      - name: Asset Budget Check
        run: npm run budget:check
